<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Welcome Page</title>
  <style>
    body {
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      margin: 0;
    }
    .navbar {
      background: #1976d2;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .navbar h1 {
      margin: 0;
      font-size: 22px;
    }
    .navbar a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      margin-left: 24px;
      transition: color 0.2s;
    }
    .navbar a:hover {
      color: #ffc107;
    }
    .container {
      background: #fff;
      margin: 40px auto;
      padding: 40px 32px;
      border-radius: 10px;
      box-shadow: 0 6px 32px rgba(0,0,0,0.08);
      width: 650px;
      text-align: center;
    }
    .container h2 {
      color: #1976d2;
      margin-bottom: 20px;
    }
    .container p {
      font-size: 18px;
      color: #555;
    }
    .logout-btn {
      margin-top: 32px;
      padding: 10px 30px;
      background: #d32f2f;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .logout-btn:hover {
      background: #b71c1c;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <h1>My Web App</h1>
    <div>
      <a href="#">Home</a>
      <a href="#">Profile</a>
      <a href="#">About</a>
    </div>
  </div>
  <div class="container">
    <h2>Selamat Datang, admin!</h2>
    <p>Anda telah berhasil login. Ini adalah halaman utama setelah login.</p>
    <button class="logout-btn" onclick="window.location.href='login.html'">Logout</button>
    <a href="coding.html"></a>
  </div>
</body>
</html>
